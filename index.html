<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Pixel Oasis Jump</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; }
        
        body {
            margin: 0; padding: 0;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%);
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
        }

        #game-container {
            width: 100%; max-width: 800px;
            height: 90vh;
            position: relative;
            background: linear-gradient(180deg, #d0e8f0 0%, #ffe5ec 100%); /* Dreamy sky from images */
            border: 10px solid white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
        }

        /* --- UI ELEMENTS --- */
        #ui-bar {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 20px; color: #f59e0b; font-size: 10px; z-index: 100;
        }

        /* --- THE NASRINA DIALOGUE (MATCHING YOUR INSPOS) --- */
        #nasrina-box {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 85%;
            background: rgba(255, 255, 255, 0.95);
            border: 3px solid #ffc1cc;
            border-radius: 15px;
            padding: 15px;
            display: flex; align-items: center; gap: 15px;
            z-index: 1000;
        }

        #avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: #ffe5ec;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px; color: #ff69b4;
            border: 2px solid white;
        }

        #quest-text { font-size: 8px; color: #5a7d55; line-height: 1.6; flex: 1; }

        /* --- PLAYER --- */
        #player {
            position: absolute; bottom: 20%; left: 50px;
            font-size: 60px; /* Big pink flower from images! */
            z-index: 100;
            transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- PLATFORMS --- */
        .platform {
            position: absolute;
            background: #fff;
            border: 3px solid #ffeff2;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(255, 182, 193, 0.3);
            z-index: 50;
        }

        /* --- ITEMS --- */
        .collectible {
            position: absolute; font-size: 30px; z-index: 80;
            animation: bounce 1.5s infinite;
        }

        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        /* --- OVERLAYS --- */
        .overlay {
            position: absolute; inset: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 2000;
            text-align: center;
        }

        h1 { font-family: 'Playfair Display', serif; color: #ff69b4; font-style: italic; font-size: 40px; }
        
        .btn {
            margin-top: 30px; padding: 20px 40px;
            background: #c6f6d5; border-radius: 50px;
            border: none; color: #2d5a27; cursor: pointer;
            font-size: 10px; transition: 0.3s;
        }
        .btn:hover { transform: scale(1.1); background: #ffc1cc; }
    </style>
</head>
<body onclick="jump()" ontouchstart="jump()">

<div id="game-container">
    <div id="ui-bar">
        <span>CHARMS: <span id="score">0</span></span>
        <span>TIME: <span id="time">1:53</span></span>
    </div>

    <div id="nasrina-box">
        <div id="avatar">🌸</div>
        <span id="quest-text">Nasrina: Welcome, Queen! Tap to jump on the pillars and gather 10 charms for our magical ritual. ✨🌿</span>
    </div>

    <div id="player">🌸</div>

    <div id="start-overlay" class="overlay">
        <h1>Oasis Journey</h1>
        <button class="btn" onclick="startGame(event)">BEGIN JOURNEY</button>
    </div>

    <div id="win-overlay" class="overlay" style="display: none;">
        <h1 style="font-size: 50px;">👑</h1>
        <h2 style="font-family: 'Playfair Display', serif; color: #db7093;">Oasis Master</h2>
        <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
</div>

<script>
    let score = 0; let isJumping = false; let gameActive = false;
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');

    function startGame(e) {
        e.stopPropagation(); // Don't trigger the jump on click!
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        
        // Spawn our moving world (platforms and items)
        setInterval(spawnPlatform, 3000);
        setInterval(spawnItem, 2500);
    }

    function jump() {
        if (!gameActive || isJumping) return;
        isJumping = true;
        player.style.bottom = '55%';
        setTimeout(() => {
            player.style.bottom = '20%';
            setTimeout(() => { isJumping = false; }, 400);
        }, 400);
    }

    function spawnPlatform() {
        if(!gameActive) return;
        const plat = document.createElement('div');
        plat.className = 'platform';
        
        // Create random platform sizes
        plat.style.width = (60 + Math.random() * 60) + 'px';
        plat.style.height = (80 + Math.random() * 80) + 'px';
        
        plat.style.bottom = '15%'; plat.style.left = '110vw';
        container.appendChild(plat);

        let pos = 110;
        const moveInt = setInterval(() => {
            if(!gameActive) return;
            pos -= 1; plat.style.left = pos + 'vw';
            if (pos < -15) { plat.remove(); clearInterval(moveInt); }
        }, 20);
    }

    function spawnItem() {
        if(!gameActive) return;
        const item = document.createElement('div');
        item.className = 'collectible';
        item.innerText = ['✨', '💎', '🍵', '🦋'][Math.floor(Math.random() * 4)];
        
        item.style.bottom = (30 + Math.random() * 40) + '%';
        item.style.left = '110vw';
        container.appendChild(item);

        let pos = 110;
        const moveInt = setInterval(() => {
            if(!gameActive) return;
            pos -= 1; item.style.left = pos + 'vw';
            
            // Collect the item!
            const pRect = player.getBoundingClientRect();
            const iRect = item.getBoundingClientRect();
            if (iRect.left < pRect.right - 10 && iRect.right > pRect.left + 10 && iRect.top < pRect.bottom && iRect.bottom > pRect.top) {
                score++;
                document.getElementById('score').innerText = score;
                item.remove(); clearInterval(moveInt);
                
                // WIN!
                if(score === 10) {
                    gameActive = false;
                    document.getElementById('win-overlay').style.display = 'flex';
                }
            }
            if (pos < -15) { item.remove(); clearInterval(moveInt); }
        }, 20);
    }
</script>
</body>
</html>
