<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Pixel Oasis</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; background: #ffe5ec; font-family: 'Press Start 2P', cursive; }
        #game-container {
            width: 800px; height: 500px; position: relative; border: 8px solid white; border-radius: 20px;
            background: linear-gradient(180deg, #d0e8f0 0%, #ffe5ec 100%); overflow: hidden;
        }

        /* --- THE SCROLLING GARDEN --- */
        .scenery { position: absolute; bottom: 0; width: 200%; height: 150px; background-repeat: repeat-x; z-index: 1; animation: scroll 20s linear infinite; opacity: 0.8; }
        @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
        
        .grass { background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><path d="M0 20 L10 10 L20 20 L30 10 L40 20 L50 10 L60 20 L70 10 L80 20 L90 10 L100 20 Z" fill="%23d4e4bc"/></svg>'); bottom: 0; height: 40px; z-index: 10; }

        /* --- THE PLAYER --- */
        #player { position: absolute; bottom: 60px; left: 100px; font-size: 50px; z-index: 100; transition: bottom 0.1s linear; }

        /* --- PILLARS --- */
        .pillar { position: absolute; bottom: 0; width: 60px; background: white; border: 3px solid #ffeff2; border-radius: 10px 10px 0 0; z-index: 50; }
        .pillar::after { content: '🧁'; position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 20px; }

        /* --- UI & DIALOGUE --- */
        #ui { position: absolute; top: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 200; color: #f59e0b; font-size: 12px; }
        #nasrina-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; background: white; border: 3px solid #ffc1cc; border-radius: 15px; padding: 15px; z-index: 300; display: flex; align-items: center; gap: 15px; }
        #avatar { font-size: 30px; }
        #text { font-size: 8px; color: #5a7d55; line-height: 1.5; }

        .overlay { position: absolute; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        .btn { padding: 15px 30px; background: #c6f6d5; border: none; border-radius: 50px; cursor: pointer; font-family: 'Press Start 2P'; font-size: 10px; }
    </style>
</head>
<body onkeydown="if(event.code==='Space') jump()" onclick="jump()">

<div id="game-container">
    <div id="ui"><span>CHARMS: <span id="score">0</span></span> <span>TIME: 1:53</span></div>
    <div class="scenery grass"></div>
    <div id="player">🌸</div>

    <div id="nasrina-box">
        <div id="avatar">🌸</div>
        <div id="text">Nasrina: Welcome, Queen! Use Space or Tap to jump on the marshmallow pillars! 🌿✨</div>
    </div>

    <div id="start-overlay" class="overlay">
        <h1 style="font-family: 'Playfair Display'; color: #ff69b4;">Oasis Journey</h1>
        <button class="btn" onclick="startGame(event)">BEGIN</button>
    </div>
</div>

<script>
    let gameActive = false; let score = 0;
    let py = 60; let vy = 0; const gravity = 0.8;
    const player = document.getElementById('player');
    const container = document.getElementById('game-container');

    function startGame(e) {
        e.stopPropagation();
        document.getElementById('start-overlay').style.display = 'none';
        gameActive = true;
        requestAnimationFrame(update);
        setInterval(spawnPillar, 2000);
    }

    function jump() {
        if (!gameActive || py > 70) return; // Only jump if on ground/pillar
        vy = -15;
    }

    function spawnPillar() {
        if (!gameActive) return;
        const p = document.createElement('div');
        p.className = 'pillar';
        p.style.height = (50 + Math.random() * 100) + 'px';
        p.style.left = '850px';
        container.appendChild(p);
        
        let posX = 850;
        const move = setInterval(() => {
            if (!gameActive) return;
            posX -= 4;
            p.style.left = posX + 'px';
            
            // Collision Logic
            const pRect = player.getBoundingClientRect();
            const piRect = p.getBoundingClientRect();
            
            if (pRect.right > piRect.left && pRect.left < piRect.right && pRect.bottom > piRect.top) {
                if (vy > 0 && pRect.bottom < piRect.top + 20) {
                    py = piRect.height + 5; // Land on top!
                    vy = 0;
                }
            }

            if (posX < -100) { p.remove(); clearInterval(move); }
        }, 20);
    }

    function update() {
        if (!gameActive) return;
        
        vy += gravity;
        py -= vy;
        
        if (py < 60) { py = 60; vy = 0; } // Ground level
        player.style.bottom = py + 'px';
        
        requestAnimationFrame(update);
    }
</script>
</body>
</html>
