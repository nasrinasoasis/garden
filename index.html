<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Oasis Affirmations</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #F7FDFF; /* Matches nasrinasoasis.com background */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .mirror-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            padding: 50px;
            border-radius: 40px;
            border: 4px solid #FFD1DC; /* Soft blush pink border */
            box-shadow: 0 15px 35px rgba(255, 209, 220, 0.4);
            text-align: center;
            max-width: 550px;
            width: 85%;
            animation: fadeIn 1.2s ease-out;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #E687B5; /* Shiny pink matching your site's font */
            font-size: 32px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(230, 135, 181, 0.3), 2px 2px 0px white;
        }

        #affirmation-text {
            font-size: 19px;
            color: #82A772; /* Leaf green matching your site's emojis */
            line-height: 1.7;
            min-height: 90px;
            margin-bottom: 35px;
            transition: opacity 0.4s ease;
        }

        .sparkle-btn {
            background: #FFD1DC;
            color: #E687B5;
            border: none;
            padding: 18px 35px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 209, 220, 0.6);
        }

        .sparkle-btn:hover {
            transform: translateY(-3px);
            background: #fbc2eb;
            color: white;
        }

        .decoration {
            font-size: 45px;
            margin-bottom: 15px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="mirror-card">
    <div class="decoration">🌸🌿🌷</div>
    <h1>Nasrina's Oasis</h1>
    <div id="affirmation-text">Tap the button to manifest your magic, Queen...</div>
    <button class="sparkle-btn" onclick="generateAffirmation()">Manifest ✨</button>
</div>

<script>
    const affirmations = [
        "I am beautiful, kind, and capable. 🌙✨",
        "My potential is as vast as the ocean. 🌊💖",
        "I deserve a life filled with peace, pink flowers, and success. 🌷🩰",
        "My heart is a garden where kindness grows daily. 🌿💕",
        "I am capable of all my own dreams. 🏰✨",
        "Every day, I am becoming the best version of myself. 🌸🧸",
        "I am worthy of all the self-love and treats in the world. 🧁💖",
        "My journey is unique, and I am exactly where I need to be. ✨🐚",
        "I shine with a light that inspires everyone around me. 🌟💅"
    ];

    function generateAffirmation() {
        const textElement = document.getElementById('affirmation-text');
        const randomAffirmation = affirmations[Math.floor(Math.random() * affirmations.length)];
        
        textElement.style.opacity = 0;
        setTimeout(() => {
            textElement.innerText = randomAffirmation;
            textElement.style.opacity = 1;
        }, 400);
    }
</script>

</body>
</html>
