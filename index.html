<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Enchanted Garden</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #a6c1ee; font-family: 'Press Start 2P', cursive; }
        #game-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        
        /* --- THE ALICE GARDEN LAYERS --- */
        .layer { position: absolute; width: 200%; height: 100%; top: 0; left: 0; background-repeat: repeat-x; background-position: bottom; }
        
        /* 1. Far Mountains (Move slowest) */
        .mountains { background-image: url('https://i.imgur.com/vH9vT5A.png'); background-size: contain; opacity: 0.6; z-index: 1; animation: move 60s linear infinite; }
        
        /* 2. Trees & Flowers (Move medium) */
        .trees { background-image: url('https://i.imgur.com/kS9yXqW.png'); background-size: contain; z-index: 2; animation: move 30s linear infinite; bottom: 50px; }
        
        /* 3. The Ground (Move fastest) */
        .ground { height: 100px; bottom: 0; background: #d4e4bc; border-top: 5px solid #88ab75; z-index: 10; width: 100%; }

        @keyframes move { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- CHARACTERS --- */
        #player { position: absolute; bottom: 100px; left: 150px; font-size: 60px; z-index: 100; transition: bottom 0.1s; }
        .pillar { position: absolute; bottom: 0; width: 100px; background: white; border: 4px solid #ffc1cc; border-radius: 15px 15px 0 0; z-index: 15; }
        .treat { position: absolute; font-size: 40px; z-index: 20; }

        #ui { position: absolute; top: 20px; left: 20px; color: #db7093; z-index: 1000; font-size: 14px; text-shadow: 2px 2px white; }
    </style>
</head>
<body onclick="jump()">

    <div id="ui">CHARMS: <span id="score">0</span></div>
    <div id="game-container">
        <div class="layer mountains"></div>
        <div class="layer trees"></div>
        <div class="ground"></div>
        <div id="player">🌸</div>
    </div>

<script>
    let score = 0;
    const player = { y: 100, dy: 0, jump: -18, grav: 0.9, onPillar: false };
    const container = document.getElementById('game-container');
    const playerEl = document.getElementById('player');

    function jump() {
        if (player.y <= 105 || player.onPillar) {
            player.dy = player.jump;
            player.onPillar = false;
        }
    }

    function spawnPillar() {
        const h = 150 + Math.random() * 150;
        const p = document.createElement('div');
        p.className = 'pillar';
        p.style.height = h + 'px';
        p.style.left = '110vw';
        
        const t = document.createElement('div');
        t.className = 'treat';
        t.innerText = '🧁';
        t.style.left = '110vw';
        t.style.bottom = (h + 10) + 'px';
        
        container.appendChild(p);
        container.appendChild(t);

        let posX = 110;
        const move = setInterval(() => {
            posX -= 0.5;
            p.style.left = posX + 'vw';
            t.style.left = (posX + 2) + 'vw';

            // Landing & Collecting
            const pRect = playerEl.getBoundingClientRect();
            const piRect = p.getBoundingClientRect();
            
            if (pRect.right > piRect.left && pRect.left < piRect.right) {
                if (pRect.bottom > piRect.top && pRect.bottom < piRect.top + 50 && player.dy >= 0) {
                    player.y = h;
                    player.dy = 0;
                    player.onPillar = true;
                    if(t.style.display !== 'none') {
                        t.style.display = 'none';
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                }
            }

            if (posX < -20) { p.remove(); t.remove(); clearInterval(move); }
        }, 10);
    }

    function update() {
        player.dy += player.grav;
        player.y -= player.dy;
        
        if (player.y < 100) { player.y = 100; player.dy = 0; }
        playerEl.style.bottom = player.y + 'px';
        requestAnimationFrame(update);
    }

    setInterval(spawnPillar, 3000);
    update();
</script>
</body>
</html>
