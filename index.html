<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Oasis Affirmations</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Poppins:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); /* Dreamy pink to blue */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .mirror-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 30px;
            border: 3px solid #ffe5ec;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 1.5s ease-in;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #db7093;
            font-size: 28px;
            margin-bottom: 20px;
        }

        #affirmation-text {
            font-size: 18px;
            color: #5a7d55; /* Matcha green text */
            line-height: 1.6;
            min-height: 80px;
            margin-bottom: 30px;
        }

        .sparkle-btn {
            background: #ffc1cc;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(255, 193, 204, 0.4);
        }

        .sparkle-btn:hover {
            transform: scale(1.05);
            background: #fbc2eb;
        }

        .decoration {
            font-size: 40px;
            margin-bottom: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="mirror-card">
    <div class="decoration">🌸✨🐚</div>
    <h1>Nasrina's Oasis</h1>
    <div id="affirmation-text">Click the button below to receive a message from the universe, Queen...</div>
    <button class="sparkle-btn" onclick="generateAffirmation()">Manifest Magic ✨</button>
</div>

<script>
    const affirmations = [
        "I am beautiful, kind, and capable. 🌙✨",
        "My potential is as vast as the ocean. 🌊💖",
        "I deserve a life filled with peace, pink flowers, and success. 🌷🩰",
        "My heart is a garden where kindness grows daily. 🌿💕",
        "I am capable of all my own dreams. 🏰✨",
        "Every day, I am becoming the best version of myself. 🌸🧸",
        "I am worthy of all the self-love and treats in the world. 🧁💖",
        "My journey is unique, and I am exactly where I need to be. ✨🐚",
        "I shine with a light that inspires everyone around me. 🌟💅"
    ];

    function generateAffirmation() {
        const textElement = document.getElementById('affirmation-text');
        const randomAffirmation = affirmations[Math.floor(Math.random() * affirmations.length)];
        
        // Add a little fade effect
        textElement.style.opacity = 0;
        setTimeout(() => {
            textElement.innerText = randomAffirmation;
            textElement.style.opacity = 1;
        }, 300);
    }
</script>

</body>
</html>
