<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Garden Fix</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #ffe5ec; font-family: 'Press Start 2P', cursive; }
        #game-canvas { display: block; background: linear-gradient(to bottom, #d0e8f0, #ffe5ec); cursor: pointer; }
        #ui { position: absolute; top: 20px; left: 20px; color: #db7093; font-size: 12px; pointer-events: none; }
        #nasrina-speech {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 80%; background: white; border: 4px solid #ffc1cc; border-radius: 15px;
            padding: 15px; font-size: 8px; color: #5a7d55; line-height: 1.5;
        }
    </style>
</head>
<body onclick="handleInput()" onkeydown="if(event.code==='Space') handleInput()">

    <div id="ui">CHARMS: <span id="score">0</span>/10</div>
    <canvas id="game-canvas"></canvas>
    
    <div id="nasrina-speech">
        🌸 Nasrina: "Queen, I fixed the magic! Tap to jump. If you land on a marshmallow pillar, you'll stay on top! Grab 10 treats to win!"
    </div>

<script>
    const canvas = document.getElementById('game-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 800;
    canvas.height = 500;

    let score = 0;
    let gameActive = true;

    // Player Object
    const player = {
        x: 100, y: 350, w: 50, h: 50,
        dy: 0, jumpForce: -15, gravity: 0.8,
        grounded: false, emoji: '🌸'
    };

    const pillars = [];
    let frame = 0;

    function spawnPillar() {
        const height = 100 + Math.random() * 150;
        pillars.push({
            x: canvas.width,
            y: canvas.height - height,
            w: 70,
            h: height,
            hasTreat: true
        });
    }

    function handleInput() {
        if (player.grounded) {
            player.dy = player.jumpForce;
            player.grounded = false;
        }
    }

    function update() {
        if (!gameActive) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Physics
        player.dy += player.gravity;
        player.y += player.dy;
        player.grounded = false;

        // Ground Floor
        if (player.y > 350) {
            player.y = 350;
            player.dy = 0;
            player.grounded = true;
        }

        // Draw Player
        ctx.font = "50px Arial";
        ctx.fillText(player.emoji, player.x, player.y + 40);

        // Handle Pillars
        for (let i = pillars.length - 1; i >= 0; i--) {
            let p = pillars[i];
            p.x -= 4;

            // Draw Pillar (Marshmallow Style)
            ctx.fillStyle = "white";
            ctx.strokeStyle = "#ffeff2";
            ctx.lineWidth = 4;
            ctx.fillRect(p.x, p.y, p.w, p.h);
            ctx.strokeRect(p.x, p.y, p.w, p.h);

            // Draw Treat
            if (p.hasTreat) {
                ctx.font = "30px Arial";
                ctx.fillText("🧁", p.x + 15, p.y - 10);
            }

            // LANDING LOGIC (The Fix!)
            if (player.x + player.w > p.x && player.x < p.x + p.w) {
                // Check if falling onto the top of a pillar
                if (player.y + player.h > p.y && player.y + player.h < p.y + 30 && player.dy >= 0) {
                    player.y = p.y - player.h;
                    player.dy = 0;
                    player.grounded = true;
                    
                    // Collect Treat!
                    if (p.hasTreat) {
                        p.hasTreat = false;
                        score++;
                        document.getElementById('score').innerText = score;
                        if(score >= 10) {
                           alert("You Won, Queen! 👑");
                           location.reload();
                        }
                    }
                }
            }

            if (p.x + p.w < 0) pillars.splice(i, 1);
        }

        if (frame % 100 === 0) spawnPillar();
        frame++;
        requestAnimationFrame(update);
    }

    update();
</script>
</body>
</html>
