<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nasrina's Eternal Oasis</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; background: #a6c1ee; font-family: 'Press Start 2P', cursive; }
        #game-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }

        /* --- THE PERMANENT GARDEN LAYERS --- */
        .layer { position: absolute; width: 200%; bottom: 0; left: 0; }
        
        /* Layer 1: Dreamy Far Mountains */
        .mountains { height: 300px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 20"><path d="M0 20 L20 5 L40 20 L60 2 L80 20 L100 5 L100 20 Z" fill="%23d1d8e0" opacity="0.5"/></svg>'); background-repeat: repeat-x; animation: move 60s linear infinite; z-index: 1; }
        
        /* Layer 2: Enchanted Trees */
        .trees { height: 200px; background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 40"><circle cx="20" cy="30" r="15" fill="%23fbc2eb"/><circle cx="50" cy="25" r="20" fill="%23fbc2eb"/><circle cx="80" cy="30" r="15" fill="%23fbc2eb"/></svg>'); background-repeat: repeat-x; animation: move 30s linear infinite; z-index: 2; bottom: 40px; }
        
        /* Layer 3: The Ground */
        .ground { height: 100px; bottom: 0; background: #d4e4bc; border-top: 10px solid #c5d8a8; z-index: 10; width: 100%; position: absolute; }

        @keyframes move { from { transform: translateX(0); } to { transform: translateX(-50%); } }

        /* --- CHARACTERS & OBJECTS --- */
        #player { position: absolute; bottom: 100px; left: 150px; font-size: 60px; z-index: 100; transition: bottom 0.1s; }
        .pillar { position: absolute; bottom: 0; width: 100px; background: white; border: 4px solid #ffeff2; border-radius: 20px 20px 0 0; z-index: 15; box-shadow: 0 -5px 15px rgba(255,193,204,0.3); }
        .treat { position: absolute; font-size: 40px; z-index: 20; }

        #ui { position: absolute; top: 20px; left: 20px; color: #db7093; z-index: 1000; font-size: 14px; text-shadow: 2px 2px white; }
    </style>
</head>
<body onclick="jump()">

    <div id="ui">CHARMS: <span id="score">0</span>/10</div>
    <div id="game-container">
        <div class="layer mountains"></div>
        <div class="layer trees"></div>
        <div class="ground"></div>
        <div id="player">🌸</div>
    </div>

<script>
    let score = 0;
    const player = { y: 100, dy: 0, jump: -20, grav: 1.0, onPillar: false };
    const container = document.getElementById('game-container');
    const playerEl = document.getElementById('player');

    function jump() {
        if (player.y <= 105 || player.onPillar) {
            player.dy = player.jump;
            player.onPillar = false;
        }
    }

    function spawnPillar() {
        const h = 180 + Math.random() * 120;
        const p = document.createElement('div');
        p.className = 'pillar';
        p.style.height = h + 'px';
        p.style.left = '110vw';
        
        const t = document.createElement('div');
        t.className = 'treat';
        t.innerText = '🧁';
        t.style.left = '110.5vw';
        t.style.bottom = (h + 10) + 'px';
        
        container.appendChild(p);
        container.appendChild(t);

        let posX = 110;
        const move = setInterval(() => {
            posX -= 0.6;
            p.style.left = posX + 'vw';
            t.style.left = (posX + 2) + 'vw';

            const pRect = playerEl.getBoundingClientRect();
            const piRect = p.getBoundingClientRect();
            
            // Solid Landing Logic
            if (pRect.right > piRect.left + 10 && pRect.left < piRect.right - 10) {
                if (pRect.bottom > piRect.top && pRect.bottom < piRect.top + 60 && player.dy >= 0) {
                    player.y = h;
                    player.dy = 0;
                    player.onPillar = true;
                    if(t.style.display !== 'none') {
                        t.style.display = 'none';
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                }
            }

            if (posX < -20) { p.remove(); t.remove(); clearInterval(move); }
        }, 10);
    }

    function update() {
        player.dy += player.grav;
        player.y -= player.dy;
        
        if (player.y < 100) { player.y = 100; player.dy = 0; }
        playerEl.style.bottom = player.y + 'px';
        requestAnimationFrame(update);
    }

    setInterval(spawnPillar, 2500);
    update();
</script>
</body>
</html>
